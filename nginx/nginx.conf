worker_processes auto;

events {
     worker_connections 1024;
}

http {

     server {
          
          ssl_certificate /etc/ssl/certs/localhost.crt;
          ssl_certificate_key /etc/ssl/private/localhost.key;
          listen 443 ssl;

          location / {
               proxy_pass http://172.17.0.3:4000/;
          }
     }
   
     server {
          
          ssl_certificate /etc/ssl/certs/localhost.crt;
          ssl_certificate_key /etc/ssl/private/localhost.key;
          listen 8081 ssl;

          location / {
               proxy_pass http://172.17.0.4:8088/;
          }
     }
}
